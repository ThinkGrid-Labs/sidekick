# docker-compose.full.yml — all-in-one single-container variant
#
# Spins up one container that runs PostgreSQL + Redis + Sidekick server +
# the React dashboard. Ideal for demos, CI smoke tests, or single-node
# self-hosted deployments where you don't want to manage external services.
#
# Usage:
#   docker compose -f docker-compose.full.yml up -d
#
# The dashboard is available at http://localhost:3000
# Set SDK_KEY before running in any non-demo environment.

services:
  sidekick:
    build:
      context: .
      dockerfile: Dockerfile.full
    image: sidekick:full
    container_name: sidekick-full
    ports:
      - "3000:3000"
    environment:
      POSTGRES_USER: sidekick
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sidekick}
      POSTGRES_DB: sidekick
      SDK_KEY: ${SDK_KEY:-}
    volumes:
      - sidekick_full_pgdata:/var/lib/postgresql/data
      - sidekick_full_redis:/var/lib/redis
    restart: unless-stopped

volumes:
  sidekick_full_pgdata:
  sidekick_full_redis:
